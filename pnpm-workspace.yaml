onlyBuiltDependencies:
  - "@biomejs/biome"
  - es5-ext
  - esbuild
  - sharp

overrides:
  yamanoku.github.io>vite: ^7.3.2

packageExtensions:
  "@eslint/css":
    peerDependencies:
      "@types/css-tree": 2.3.10

allowBuilds:
  esbuild: true
  sharp: true

packages:
  - packages/*
  - presentations

catalogs:
  website:
    "@biomejs/biome": 2.4.16
    "@tailwindcss/vite": 4.3.0
    astro: 6.4.4
    gh-pages: 6.3.0
    markuplint: 4.18.3
    modern-normalize: 3.0.1
    tailwindcss: 4.3.0
    vite: 7.3.2
  yama-normalize:
    "@eslint/css": 1.3.0
