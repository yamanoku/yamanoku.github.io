onlyBuiltDependencies:
  - "@biomejs/biome"
  - es5-ext
  - esbuild
  - sharp

overrides:
  yamanoku.github.io>vite: ^8.1.4

packageExtensions:
  "@eslint/css":
    peerDependencies:
      "@types/css-tree": 2.3.10

allowBuilds:
  esbuild: true
  sharp: true

packages:
  - packages/*
  - records
  - records/presentations

catalogs:
  website:
    "@biomejs/biome": 2.5.4
    "@tailwindcss/vite": 4.3.2
    astro: 7.0.7
    markuplint: 4.18.3
    modern-normalize: 3.0.1
    tailwindcss: 4.3.2
    vite: 8.1.4
  yama-normalize:
    "@eslint/css": 1.4.0
  presentations:
    "@11ty/eleventy": 3.1.6
    "@iconify-json/twemoji": 1.2.5
    "@iconify-json/vscode-icons": 1.2.67
    "@slidev/cli": 52.18.0
    "@slidev/theme-apple-basic": 0.25.1
    "@slidev/theme-default": 0.25.0
    budoux: 0.8.4
    highlight.js: 11.11.1
    markdown-it: 14.3.0
    markdown-it-footnote: 4.0.0
    vue: 3.5.39
