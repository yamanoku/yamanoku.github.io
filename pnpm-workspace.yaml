onlyBuiltDependencies:
  - "@biomejs/biome"
  - es5-ext
  - esbuild
  - sharp

overrides:
  yamanoku.github.io>vite: ^7.3.5

packageExtensions:
  "@eslint/css":
    peerDependencies:
      "@types/css-tree": 2.3.10

allowBuilds:
  esbuild: true
  sharp: true

packages:
  - packages/*
  - presentations

catalogs:
  website:
    "@biomejs/biome": 2.4.16
    "@tailwindcss/vite": 4.3.0
    astro: 6.4.6
    markuplint: 4.18.3
    modern-normalize: 3.0.1
    tailwindcss: 4.3.0
    vite: 7.3.5
  yama-normalize:
    "@eslint/css": 1.3.0
  presentations:
    "@11ty/eleventy": 3.1.6
    "@iconify-json/twemoji": 1.2.5
    "@iconify-json/vscode-icons": 1.2.55
    "@slidev/cli": 52.16.0
    "@slidev/theme-apple-basic": 0.25.1
    "@slidev/theme-default": 0.25.0
    budoux: 0.8.4
    highlight.js: 11.11.1
    markdown-it: 14.2.0
    markdown-it-footnote: 4.0.0
    vue: 3.5.35
