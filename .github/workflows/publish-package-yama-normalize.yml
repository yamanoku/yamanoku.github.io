name: Publish Package yama-normalize

on:
  push:
    tags:
      - 'yama-normalize@*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Install pnpm
      uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'pnpm'
    - name: Update npm latest
      run: npm install -g npm@latest
    - name: install, test, and publish
      run: |
        pnpm install
        pnpm yama-normalize test
        pnpm publish --no-git-checks ./packages/yama-normalize
